global:
  checkNewVersion: true
  sendAnonymousUsage: false

entryPoints:
  web:
    address: :80
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https

  websecure:
    address: :443

serversTransport:
  insecureSkipVerify: true

api:
  insecure: true
  dashboard: true

providers:
  docker:
    defaultRule: Host(`{{ index .Labels "com.docker.compose.service" }}.olym.local`)
    network: traefik
