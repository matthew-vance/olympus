- hosts: k3s_lbs
  become: true
  tasks:
    - name: Install HAProxy and keepalived
      apt:
        pkg:
          - haproxy
          - keepalived
        update_cache: true

- hosts: k3s_clbs
  become: true
  tasks:
    - name: Configure HAProxy
      blockinfile:
        path: /etc/haproxy/haproxy.cfg
        block: |
          frontend k3s-frontend
            bind *:6443
            mode tcp
            option tcplog
            default_backend k3s-backend

          backend k3s-backend
            mode tcp
            option tcp-check
            balance roundrobin
            default-server inter 10s downinter 5s
            server k3s-server-0 10.10.3.101:6443 check
            server k3s-server-1 10.10.3.102:6443 check
            server k3s-server-2 10.10.3.103:6443 check
    - name: Restart HAProxy
      service:
        name: haproxy
        state: restarted

- hosts: k3s_clb_0
  become: true
  tasks:
    - name: Configure keepalived
      vars:
        keepalived_state: MASTER
        keepalived_priority: 200
      template:
        src: files/keepalived.conf.j2
        dest: /etc/keepalived/keepalived.conf
    - name: Restart keepalived
      service:
        name: keepalived
        state: restarted

- hosts: k3s_clb_1
  become: true
  tasks:
    - name: Configure keepalived
      vars:
        keepalived_state: BACKUP
        keepalived_priority: 100
      template:
        src: files/keepalived.conf.j2
        dest: /etc/keepalived/keepalived.conf
    - name: Restart keepalived
      service:
        name: keepalived
        state: restarted

- hosts: k3s_init_server
  tasks:
    - name: Init k3s cluster
      shell: curl -sfL https://get.k3s.io | K3S_TOKEN={{ k3s_token }} sh -s - server --cluster-init --tls-san={{ k3s_clb_vip }}
      args:
        creates: /etc/systemd/system/k3s.service
    - name: Copy kubeconfig to local machine
      become: true
      fetch:
        src: /etc/rancher/k3s/k3s.yaml
        dest: ~/.kube/config
        flat: yes

- hosts: localhost
  tasks:
    - name: Set kubeconfig cluster server
      lineinfile:
        path: ~/.kube/config
        search_string: "server: https://"
        line: "    server: https://10.10.3.93:6443"

- hosts: k3s_servers
  tasks:
    - name: Join servers to k3s cluster
      shell: curl -sfL https://get.k3s.io | K3S_TOKEN={{ k3s_token }} sh -s - server --server https://{{ hostvars['k3s-server-0']['ansible_default_ipv4']['address'] }}:6443 --tls-san={{ k3s_clb_vip }}
      args:
        creates: /etc/systemd/system/k3s.service

- hosts: k3s_agents
  tasks:
    - name: Join agents to k3s cluster
      shell: curl -sfL https://get.k3s.io | K3S_TOKEN={{ k3s_token }} sh -s - agent --server https://{{ k3s_clb_vip }}:6443
      args:
        creates: /etc/systemd/system/k3s-agent.service
