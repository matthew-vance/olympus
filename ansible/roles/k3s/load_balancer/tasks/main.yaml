- name: Configure HAProxy
  blockinfile:
    path: /etc/haproxy/haproxy.cfg
    block: |
      frontend k3s-frontend
        bind *:6443
        mode tcp
        option tcplog
        default_backend k3s-backend

      backend k3s-backend
        mode tcp
        option tcp-check
        balance roundrobin
        default-server inter 10s downinter 5s
        server k3s-server-1 10.10.3.101:6443 check
        server k3s-server-2 10.10.3.102:6443 check
        server k3s-server-3 10.10.3.103:6443 check
- name: Restart HAProxy
  service:
    name: haproxy
    state: restarted
- name: Configure keepalived
  template:
    src: files/keepalived.conf.j2
    dest: /etc/keepalived/keepalived.conf
- name: Restart keepalived
  service:
    name: keepalived
    state: restarted
